<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#00ff88">
    <meta name="description" content="Ferramenta de auditoria Trilhas de Alta Performance – Frutos de Goiás">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Trilhas FG">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon.png">
    <title>Trilhas de Alta Performance</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body class="dark-mode">
    <div class="app-container">
        <header>
            <div class="logo-container">
                <img src="logo.png" alt="Frutos de Goiás" id="main-logo">
            </div>
            <h1>Trilhas de Alta Performance</h1>
            <div class="score-badge" id="total-score-badge">
                <span class="label">Nota Final</span>
                <span class="value" id="final-score">0.0</span>
            </div>
            <div id="audit-progress-bar">
                <div id="audit-progress-fill"></div>
            </div>
        </header>

        <main id="main-content">
            <!-- Resume Banner -->
            <div id="resume-banner" class="hidden resume-banner">
                <div class="resume-info">
                    <span>📋 Auditoria em andamento:</span>
                    <strong id="resume-info"></strong>
                </div>
                <div class="resume-actions">
                    <button class="btn-resume" onclick="app.resumeAudit()">Retomar</button>
                    <button class="btn-discard" onclick="app.clearProgress()">Descartar</button>
                </div>
            </div>

            <!-- Identification -->
            <section id="step-0" class="card active">
                <h2>Identificação da Visita</h2>
                <div class="form-group">
                    <label for="unit_name">Nome da Unidade</label>
                    <input type="text" id="unit_name" placeholder="Ex: Frutos de Goiás - Cuiabá" required>
                </div>
                <div class="form-group">
                    <label for="city">Cidade</label>
                    <input type="text" id="city" placeholder="Cidade da unidade" required>
                </div>
                <div class="form-group">
                    <label for="licensee_name">Licenciado responsável</label>
                    <input type="text" id="licensee_name" placeholder="Nome do licenciado" required>
                </div>
                <div class="form-group">
                    <label for="inspector_name">Consultor Avaliador</label>
                    <input type="text" id="inspector_name" placeholder="Seu nome" required>
                </div>
                <div class="form-group">
                    <label for="visit_date">Data da Visita</label>
                    <input type="date" id="visit_date" required>
                </div>
                <button class="btn-next" onclick="app.startAudit()">Começar Auditoria</button>
            </section>

            <!-- Audit Form (Dynamic) -->
            <div id="audit-form-container"></div>

            <!-- Summary / Finalize -->
            <section id="step-final" class="card hidden">
                <h2>Diagnóstico Final e Performance</h2>
                <div class="form-group">
                    <label for="final_diagnosis">Resumo Executivo Adicional</label>
                    <textarea id="final_diagnosis" rows="4"
                        placeholder="Sua percepção final como consultor..."></textarea>
                </div>
                <button class="btn-submit" onclick="app.submitAudit()">Finalizar e Salvar</button>
            </section>

            <!-- Report -->
            <section id="results-dashboard" class="card hidden">
                <div id="printable-report"></div>
            </section>
        </main>

        <nav class="mobile-nav">
            <button onclick="location.reload()" id="nav-new">Nova Auditoria</button>
        </nav>
    </div>

    <div id="toast" class="toast"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="hidden">
        <div class="loading-content">
            <div class="picole-wrap">
                <svg class="picole-svg" viewBox="0 0 80 120" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="pg" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#00ff88"/>
                            <stop offset="100%" stop-color="#00b8ff"/>
                        </linearGradient>
                        <filter id="pglow" x="-40%" y="-40%" width="180%" height="180%">
                            <feGaussianBlur stdDeviation="5" result="b"/>
                            <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
                        </filter>
                    </defs>
                    <!-- Stick -->
                    <rect x="32" y="74" width="16" height="40" rx="8" fill="#c9956a"/>
                    <rect x="36" y="76" width="6" height="36" rx="3" fill="rgba(255,255,255,0.18)"/>
                    <!-- Body -->
                    <rect x="8" y="6" width="64" height="72" rx="30" fill="url(#pg)" filter="url(#pglow)"/>
                    <!-- Shine -->
                    <rect x="16" y="16" width="13" height="44" rx="6" fill="rgba(255,255,255,0.26)"/>
                    <!-- Drip -->
                    <ellipse class="picole-drip" cx="55" cy="75" rx="5" ry="4" fill="#00cc6e" opacity="0.9"/>
                </svg>
                <div class="sparkle sp1"></div>
                <div class="sparkle sp2"></div>
                <div class="sparkle sp3"></div>
                <div class="sparkle sp4"></div>
            </div>
            <div class="loading-title">Gerando Auditoria</div>
            <div class="loading-brand">Frutos de Goiás</div>
            <div class="loading-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {});
            });
        }
    </script>
</body>

</html>
